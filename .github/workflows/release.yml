name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write  # Required for Sigstore OIDC keyless signing

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-sign:
    name: Build, sign, and release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release

      - name: Build release binaries
        run: cargo build --release -p mojave-cli -p mojave-gsa

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign mojave binary
        run: |
          cosign sign-blob --yes \
            --output-signature mojave.sig \
            --output-certificate mojave.crt \
            target/release/mojave

      - name: Sign mojave-gsa binary
        run: |
          cosign sign-blob --yes \
            --output-signature mojave-gsa.sig \
            --output-certificate mojave-gsa.crt \
            target/release/mojave-gsa

      - name: Compute SHA256 checksums
        run: |
          cd target/release
          sha256sum mojave mojave-gsa > ../../SHA256SUMS
          cd ../..
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            target/release/mojave
            target/release/mojave-gsa
            mojave.sig
            mojave.crt
            mojave-gsa.sig
            mojave-gsa.crt
            SHA256SUMS

  verify-signatures:
    name: Verify release signatures
    runs-on: ubuntu-latest
    needs: build-and-sign
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Download release artifacts
        uses: robinraju/release-downloader@v1
        with:
          tag: ${{ github.ref_name }}
          fileName: "*"
          out-file-path: artifacts

      - name: Verify mojave signature
        run: |
          cosign verify-blob \
            --signature artifacts/mojave.sig \
            --certificate artifacts/mojave.crt \
            --certificate-identity-regexp "https://github.com/antimeme-ai/mojave/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            artifacts/mojave

      - name: Verify mojave-gsa signature
        run: |
          cosign verify-blob \
            --signature artifacts/mojave-gsa.sig \
            --certificate artifacts/mojave-gsa.crt \
            --certificate-identity-regexp "https://github.com/antimeme-ai/mojave/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            artifacts/mojave-gsa

      - name: Verify checksums
        run: |
          cd artifacts
          sha256sum -c SHA256SUMS
